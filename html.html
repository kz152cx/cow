<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圣诞树 - Holiday Magic</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Times+New+Roman&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            font-family: 'Times New Roman', serif;
            overflow: hidden;
            color: #fceea7;
        }

        /* UI Elements */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px;
            transition: opacity 0.5s ease;
            z-index: 10;
        }

        .ui-hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 56px;
            background: linear-gradient(to bottom, #ffffff, #d4af37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            letter-spacing: 4px;
        }

        .upload-wrapper {
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .upload-btn {
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid #d4af37;
            color: #d4af37;
            font-family: 'Cinzel', serif;
            font-size: 18px;
            padding: 12px 32px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .upload-btn:hover {
            background: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        .upload-btn input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer;
        }

        .hint-text {
            font-size: 14px;
            color: rgba(252, 238, 167, 0.6);
            letter-spacing: 1px;
        }

        /* Loader */
        .loader {
            position: fixed;
            inset: 0;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 1s ease;
            gap: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid transparent;
            border-top: 1px solid #d4af37;
            animation: spin 1s linear infinite;
        }

        .loader-text {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            letter-spacing: 2px;
            font-size: 18px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Webcam hidden container */
        .webcam-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            opacity: 0;
            pointer-events: none;
            z-index: 1;
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm"
            }
        }
    </script>
</head>
<body>

    <div id="loader" class="loader">
        <div class="spinner"></div>
        <div class="loader-text" id="loaderText">LOADING HOLIDAY MAGIC</div>
    </div>

    <div id="uiLayer" class="ui-layer">
        <h1>Merry Christmas</h1>
        
        <div class="upload-wrapper">
            <div class="upload-btn">
                ADD MEMORIES
                <input type="file" id="photoUpload" accept="image/*">
            </div>
            <div class="hint-text">Press 'H' to Hide Controls</div>
            <div class="hint-text" style="color: #d4af37; margin-top: 5px;">Gesture: Fist = Tree | Open = Scatter | Pinch = Focus</div>
        </div>
    </div>

    <div class="webcam-container">
        <video id="videoElement" autoplay playsinline></video>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
        import { FilesetResolver, HandLandmarker } from '@mediapipe/tasks-vision';

        // --- Global State Machine ---
        const STATE = {
            mode: 'TREE', // TREE, SCATTER, FOCUS
            targetPhoto: null,
            focusTimer: 0
        };

        // --- Core Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 2.2;
        container.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.set(0, 2, 50);

        // --- Environment & Lighting ---
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        
        const pointLight = new THREE.PointLight(0xff8c00, 2, 50);
        scene.add(pointLight);

        const spotLight1 = new THREE.SpotLight(0xd4af37, 1200);
        spotLight1.position.set(30, 40, 40);
        spotLight1.angle = Math.PI / 4;
        scene.add(spotLight1);

        const spotLight2 = new THREE.SpotLight(0x4a90e2, 600); // Blueish for contrast
        spotLight2.position.set(-30, 20, -30);
        scene.add(spotLight2);

        // --- Post-Processing ---
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.45, // strength
            0.4,  // radius
            0.7   // threshold
        );
        composer.addPass(bloomPass);

        // --- Content Generation (Textures & Materials) ---
        // Candy Cane Dynamic Texture
        const createCandyTexture = () => {
            const cvs = document.createElement('canvas');
            cvs.width = 64; cvs.height = 64;
            const ctx = cvs.getContext('2d');
            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, 64, 64);
            ctx.fillStyle = '#ff0000';
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(64, 64); 
            ctx.lineWidth = 15; ctx.stroke();
            const tex = new THREE.CanvasTexture(cvs);
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(4, 1);
            return tex;
        };

        // Default Photo Texture
        const createDefaultPhoto = () => {
            const cvs = document.createElement('canvas');
            cvs.width = 512; cvs.height = 512;
            const ctx = cvs.getContext('2d');
            ctx.fillStyle = '#d4af37'; ctx.fillRect(0, 0, 512, 512);
            ctx.fillStyle = '#000'; ctx.font = 'bold 50px Cinzel';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText("JOYEUX NOEL", 256, 256);
            const tex = new THREE.CanvasTexture(cvs);
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        };

        const matGoldBox = new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.8, roughness: 0.2 });
        const matGreenBox = new THREE.MeshStandardMaterial({ color: 0x013220, metalness: 0.2, roughness: 0.8 });
        const matGoldSphere = new THREE.MeshPhysicalMaterial({ color: 0xd4af37, metalness: 0.9, roughness: 0.1 });
        const matRedSphere = new THREE.MeshPhysicalMaterial({ color: 0xaa0000, metalness: 0.5, roughness: 0.2, clearcoat: 1.0 });
        const matCandy = new THREE.MeshStandardMaterial({ map: createCandyTexture(), roughness: 0.4 });

        const geoBox = new THREE.BoxGeometry(0.6, 0.6, 0.6);
        const geoSphere = new THREE.SphereGeometry(0.4, 16, 16);
        
        // Candy Cane Geometry
        const curve = new THREE.CatmullRomCurve3([
            new THREE.Vector3(0, -0.5, 0), new THREE.Vector3(0, 0.5, 0),
            new THREE.Vector3(0.3, 0.8, 0), new THREE.Vector3(0.6, 0.5, 0)
        ]);
        const geoCandy = new THREE.TubeGeometry(curve, 20, 0.1, 8, false);

        // --- Particle System Class ---
        const mainGroup = new THREE.Group();
        scene.add(mainGroup);
        const particles = [];

        class ParticleItem {
            constructor(index, total) {
                this.type = Math.random();
                this.mesh = this.createMesh();
                
                // Calculate Pre-defined Positions
                const t = index / total; // 0 to 1
                
                // Tree Mode (Spiral Cone)
                const maxRadius = 15;
                const radius = maxRadius * (1 - t);
                const angle = t * 50 * Math.PI;
                const y = -15 + t * 30;
                this.treePos = new THREE.Vector3(Math.cos(angle)*radius, y, Math.sin(angle)*radius);
                
                // Scatter Mode (Sphere 8~20)
                const u = Math.random();
                const v = Math.random();
                const theta = u * 2.0 * Math.PI;
                const phi = Math.acos(2.0 * v - 1.0);
                const r = 8 + Math.random() * 12;
                this.scatterPos = new THREE.Vector3(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
                
                // Rotation Velocity for Scatter Mode
                this.rotVec = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).multiplyScalar(0.05);

                this.mesh.position.copy(this.scatterPos);
                this.baseScale = new THREE.Vector3(1, 1, 1);
                
                mainGroup.add(this.mesh);
            }

            createMesh() {
                let m;
                if (this.type < 0.2) m = new THREE.Mesh(geoBox, matGoldBox);
                else if (this.type < 0.4) m = new THREE.Mesh(geoBox, matGreenBox);
                else if (this.type < 0.6) m = new THREE.Mesh(geoSphere, matGoldSphere);
                else if (this.type < 0.8) m = new THREE.Mesh(geoSphere, matRedSphere);
                else m = new THREE.Mesh(geoCandy, matCandy);
                
                m.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
                return m;
            }

            update(mode) {
                const isTarget = (this === STATE.targetPhoto && mode === 'FOCUS');
                let targetPos, targetScale;

                if (isTarget) {
                    targetPos = new THREE.Vector3(0, 2, 35);
                    targetScale = new THREE.Vector3(4.5, 4.5, 4.5);
                    // smoothly look at camera
                    this.mesh.quaternion.slerp(new THREE.Quaternion().setFromEuler(new THREE.Euler(0,0,0)), 0.05);
                } else {
                    targetPos = mode === 'TREE' ? this.treePos : this.scatterPos;
                    targetScale = this.baseScale;
                    
                    if (mode === 'SCATTER') {
                        this.mesh.rotation.x += this.rotVec.x;
                        this.mesh.rotation.y += this.rotVec.y;
                        this.mesh.rotation.z += this.rotVec.z;
                    }
                }

                this.mesh.position.lerp(targetPos, 0.04);
                this.mesh.scale.lerp(targetScale, 0.05);
            }
        }

        // Initialize 1500 main particles
        const TOTAL_PARTICLES = 1500;
        for (let i = 0; i < TOTAL_PARTICLES; i++) {
            particles.push(new ParticleItem(i, TOTAL_PARTICLES));
        }

        // Dust Particles (2500)
        const dustGeo = new THREE.BufferGeometry();
        const dustPos = new Float32Array(2500 * 3);
        for(let i=0; i<2500*3; i++) dustPos[i] = (Math.random() - 0.5) * 80;
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
        const dustMat = new THREE.PointsMaterial({ color: 0xfceea7, size: 0.1, transparent: true, opacity: 0.4 });
        const dust = new THREE.Points(dustGeo, dustMat);
        scene.add(dust);

        // --- Photo Wall Feature ---
        const photoItems = [];
        const addPhotoToScene = (texture) => {
            const frameGeo = new THREE.BoxGeometry(2, 2.5, 0.2);
            const photoMat = new THREE.MeshBasicMaterial({ map: texture });
            
            // Frame is gold, front face is photo
            const materials = [
                matGoldBox, matGoldBox, matGoldBox, matGoldBox,
                photoMat, // Front
                matGoldBox
            ];
            
            const mesh = new THREE.Mesh(frameGeo, materials);
            
            // Wrap in object mimicking ParticleItem
            const photoObj = {
                isPhoto: true,
                mesh: mesh,
                treePos: new THREE.Vector3((Math.random()-0.5)*10, Math.random()*20 - 10, (Math.random()-0.5)*10),
                scatterPos: new THREE.Vector3((Math.random()-0.5)*30, Math.random()*30-15, (Math.random()-0.5)*30),
                rotVec: new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).multiplyScalar(0.02),
                baseScale: new THREE.Vector3(1,1,1),
                update: ParticleItem.prototype.update
            };
            
            photoObj.mesh.position.copy(photoObj.scatterPos);
            mainGroup.add(photoObj.mesh);
            particles.push(photoObj);
            photoItems.push(photoObj);
        };

        // Add default photo
        addPhotoToScene(createDefaultPhoto());

        // Exact Implementation of Required Upload Logic
        const fileInput = document.getElementById('photoUpload');
        fileInput.addEventListener('change', (e) => {
            const f = e.target.files[0];
            if (!f) return;
            const reader = new FileReader();
            
            // Exact Code Block required
            reader.onload = (ev) => {
                new THREE.TextureLoader().load(ev.target.result, (t) => {
                    t.colorSpace = THREE.SRGBColorSpace; // 关键：指定色彩空间
                    addPhotoToScene(t);
                });
            }
            reader.readAsDataURL(f);
            
            STATE.mode = 'SCATTER'; // Scatter to show new photo coming in
        });

        // --- UI Interactions ---
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'h') {
                document.getElementById('uiLayer').classList.toggle('ui-hidden');
            }
        });

        // --- Computer Vision (MediaPipe) Integration ---
        let handLandmarker;
        let lastVideoTime = -1;
        const video = document.getElementById('videoElement');

        async function initCV() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 1
                });

                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 } });
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
                
                // Hide loader
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 1000);
            } catch (err) {
                console.error("Camera/CV init failed:", err);
                document.getElementById('loaderText').innerText = "CAMERA ACCESS REQUIRED FOR MAGIC";
            }
        }

        async function predictWebcam() {
            if (video.currentTime !== lastVideoTime && handLandmarker) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, performance.now());
                processGestures(results);
            }
            requestAnimationFrame(predictWebcam);
        }

        function processGestures(results) {
            if (results.landmarks && results.landmarks.length > 0) {
                const lm = results.landmarks[0];
                const wrist = lm[0];
                const thumb = lm[4];
                const index = lm[8];
                
                // Helper to calc 3D distance
                const dist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y, p1.z - p2.z);

                const pinchDist = dist(thumb, index);
                const avgFingerDist = (dist(lm[8], wrist) + dist(lm[12], wrist) + dist(lm[16], wrist) + dist(lm[20], wrist)) / 4;

                // Mode Transition Logic
                if (pinchDist < 0.05) {
                    if (STATE.mode !== 'FOCUS') {
                        STATE.mode = 'FOCUS';
                        STATE.targetPhoto = photoItems[Math.floor(Math.random() * photoItems.length)];
                    }
                } else if (avgFingerDist < 0.25) {
                    STATE.mode = 'TREE';
                    STATE.targetPhoto = null;
                } else if (avgFingerDist > 0.4) {
                    STATE.mode = 'SCATTER';
                    STATE.targetPhoto = null;
                }

                // Interactive Mapping (Landmark 9 to Rotation)
                const centerPalm = lm[9];
                const targetRotY = (centerPalm.x - 0.5) * Math.PI; // Screen X maps to Y rotation
                const targetRotX = (centerPalm.y - 0.5) * Math.PI * 0.5;

                mainGroup.rotation.y = THREE.MathUtils.lerp(mainGroup.rotation.y, targetRotY, 0.1);
                mainGroup.rotation.x = THREE.MathUtils.lerp(mainGroup.rotation.x, targetRotX, 0.1);
            } else {
                // Return to idle slow rotation if no hand detected
                mainGroup.rotation.y += 0.002;
                mainGroup.rotation.x = THREE.MathUtils.lerp(mainGroup.rotation.x, 0, 0.05);
            }
        }

        // --- Main Render Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            // Animate Dust
            dust.rotation.y = t * 0.05;
            
            // Update all particles based on State Machine
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(STATE.mode);
            }

            // Post-processing render
            composer.render();
        }

        // Window resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            bloomPass.resolution.set(window.innerWidth, window.innerHeight);
        });

        // Start Boot Sequence
        initCV();
        animate();

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圣诞树</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Times+New+Roman&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --primary-gold: #d4af37;
            --cream-white: #fceea7;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Times New Roman', serif;
        }
        
        /* Loader */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease-out;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top: 2px solid var(--primary-gold);
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text {
            color: var(--primary-gold);
            font-family: 'Cinzel', serif;
            letter-spacing: 2px;
            font-size: 14px;
        }

        /* UI Layer */
        #ui-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.5s ease;
        }
        .ui-hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }
        
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 56px;
            margin-top: 40px;
            background: linear-gradient(180deg, #ffffff 0%, var(--primary-gold) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        /* Upload Controls */
        .upload-wrapper {
            position: absolute;
            bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
        }
        .upload-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--primary-gold);
            color: var(--primary-gold);
            padding: 12px 30px;
            font-family: 'Cinzel', serif;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .upload-btn:hover {
            background: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }
        .hint {
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            letter-spacing: 1px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        /* Webcam Container (Modified) */
        #webcam-container {
            position: fixed;
            bottom: 20px; 
            right: 20px;
            /* 放大取景框尺寸 */
            width: 240px;
            height: 180px;
            border: 2px solid var(--primary-gold);
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            overflow: hidden;
            z-index: 100;
            background-color: #111;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        #cv-canvas {
            display: none;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm"
            }
        }
    </script>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div class="loading-text">LOADING HOLIDAY MAGIC</div>
    </div>

    <div id="ui-layer">
        <h1>Merry Christmas</h1>
        <div class="upload-wrapper">
            <label for="upload" class="upload-btn">ADD MEMORIES</label>
            <input type="file" id="upload" accept="image/*" style="display:none">
            <div class="hint">Press 'H' to Hide Controls</div>
        </div>
    </div>

    <div id="webcam-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="cv-canvas" width="160" height="120"></canvas>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
        import { FilesetResolver, HandLandmarker } from '@mediapipe/tasks-vision';

        // --- Core Variables ---
        let scene, camera, renderer, composer, mainGroup, pmremGenerator;
        let particles = [];
        let dustSystem;
        let handLandmarker;
        let video = document.getElementById('video');
        let lastVideoTime = -1;
        
        let treeMaterials = {}; 
        let treeColorState = 0;

        // --- State Machine ---
        const STATE = {
            mode: 'TREE',
            targetMode: 'TREE',
            focusTarget: null,
            transitionT: 0
        };

        // --- Init Pipeline ---
        async function init() {
            initThreeJS();
            createContent();
            setupPostProcessing();
            await initMediaPipe();
            
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 1000);

            window.addEventListener('resize', onWindowResize);
            
            window.addEventListener('keydown', (e) => {
                if (e.key.toLowerCase() === 'h') {
                    document.getElementById('ui-layer').classList.toggle('ui-hidden');
                }
            });
            
            setupUpload();

            updateTargets(STATE.mode);
            renderer.setAnimationLoop(animate);
        }

        // --- Three.js Setup ---
        function initThreeJS() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 50);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ReinhardToneMapping;
            renderer.toneMappingExposure = 2.2;
            document.body.appendChild(renderer.domElement);

            pmremGenerator = new THREE.PMREMGenerator(renderer);
            pmremGenerator.compileEquirectangularShader();
            scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

            mainGroup = new THREE.Group();
            scene.add(mainGroup);

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            
            const internalLight = new THREE.PointLight(0xff8800, 2, 50);
            internalLight.position.set(0, 5, 0);
            scene.add(internalLight);

            const goldSpot = new THREE.SpotLight(0xd4af37, 1200);
            goldSpot.position.set(30, 40, 40);
            scene.add(goldSpot);

            const blueSpot = new THREE.SpotLight(0x88bbff, 600);
            blueSpot.position.set(-30, 20, -30);
            scene.add(blueSpot);
        }

        function setupPostProcessing() {
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                0.45, 0.4, 0.7
            );
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);
        }

        // --- Procedural Generation ---
        function createCandyTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, 256, 256);
            ctx.fillStyle = '#ff0000';
            for (let i = -256; i < 512; i += 64) {
                ctx.beginPath();
                ctx.moveTo(i, 0); ctx.lineTo(i + 32, 0);
                ctx.lineTo(i - 256 + 32, 256); ctx.lineTo(i - 256, 256);
                ctx.fill();
            }
            return new THREE.CanvasTexture(canvas);
        }

        function createDefaultPhotoText() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0,0,512,512);
            ctx.fillStyle = '#d4af37'; ctx.font = 'bold 60px Cinzel';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('JOYEUX', 256, 216);
            ctx.fillText('NOEL', 256, 296);
            return new THREE.CanvasTexture(canvas);
        }

        function createCandyCaneGeometry() {
            const curve = new THREE.CatmullRomCurve3([
                new THREE.Vector3(0, -1, 0),
                new THREE.Vector3(0, 1, 0),
                new THREE.Vector3(0.5, 1.5, 0),
                new THREE.Vector3(1, 1, 0)
            ]);
            return new THREE.TubeGeometry(curve, 20, 0.15, 8, false);
        }

        // --- Particle Class ---
        class Particle {
            constructor(mesh, type) {
                this.mesh = mesh;
                this.type = type;
                this.targetPos = new THREE.Vector3();
                this.targetRot = new THREE.Euler();
                this.targetScale = new THREE.Vector3(1,1,1);
                this.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2
                ).normalize();
                
                this.mesh.position.set(
                    (Math.random() - 0.5) * 40,
                    (Math.random() - 0.5) * 40,
                    (Math.random() - 0.5) * 40
                );
            }

            update() {
                this.mesh.position.lerp(this.targetPos, 0.05);
                
                if (STATE.mode === 'SCATTER') {
                    this.mesh.rotation.x += this.velocity.x * 0.02;
                    this.mesh.rotation.y += this.velocity.y * 0.02;
                    this.mesh.rotation.z += this.velocity.z * 0.02;
                } else {
                    this.mesh.quaternion.slerp(new THREE.Quaternion().setFromEuler(this.targetRot), 0.05);
                }

                this.mesh.scale.lerp(this.targetScale, 0.05);
            }
        }

        // --- Content Building ---
        function createContent() {
            const geoBox = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const geoSphere = new THREE.SphereGeometry(0.3, 16, 16);
            const geoCandy = createCandyCaneGeometry();
            
            treeMaterials.gold = new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.8, roughness: 0.2 });
            treeMaterials.green = new THREE.MeshStandardMaterial({ color: 0x003311, metalness: 0.3, roughness: 0.7 });
            treeMaterials.red = new THREE.MeshPhysicalMaterial({ color: 0xaa0000, clearcoat: 1.0, clearcoatRoughness: 0.1 });
            
            const matCandy = new THREE.MeshStandardMaterial({ map: createCandyTexture() });
            const defaultPhotoTex = createDefaultPhotoText();
            defaultPhotoTex.colorSpace = THREE.SRGBColorSpace;

            const totalMainParticles = 2500; 
            
            let photoCount = 0;
            // 照片数量修改为20个
            const MAX_PHOTOS = 20;

            for(let i=0; i<totalMainParticles; i++) {
                let mesh, type;
                const rand = Math.random();
                
                if(rand < 0.1 && photoCount < MAX_PHOTOS) {
                    type = 'PHOTO';
                    mesh = createPhotoMesh(defaultPhotoTex);
                    photoCount++;
                } else if(rand < 0.13) { 
                    type = 'CANDY';
                    mesh = new THREE.Mesh(geoCandy, matCandy);
                    // 糖果手杖缩小体积 (原本为 0.5，现在为 0.3)
                    mesh.scale.set(0.3, 0.3, 0.3);
                } else if(rand < 0.65) {
                    type = 'SPHERE';
                    mesh = new THREE.Mesh(geoSphere, Math.random() > 0.5 ? treeMaterials.gold : treeMaterials.red);
                } else {
                    type = 'BOX';
                    mesh = new THREE.Mesh(geoBox, Math.random() > 0.5 ? treeMaterials.gold : treeMaterials.green);
                }

                mainGroup.add(mesh);
                particles.push(new Particle(mesh, type));
            }

            const dustGeo = new THREE.BufferGeometry();
            const dustPos = new Float32Array(2500 * 3);
            for(let i=0; i<7500; i++) dustPos[i] = (Math.random() - 0.5) * 50;
            dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
            const dustMat = new THREE.PointsMaterial({ color: 0xfceea7, size: 0.1, transparent: true, opacity: 0.6 });
            dustSystem = new THREE.Points(dustGeo, dustMat);
            mainGroup.add(dustSystem);
        }

        function createPhotoMesh(texture) {
            const group = new THREE.Group();
            const planeMat = new THREE.MeshBasicMaterial({ map: texture });
            const plane = new THREE.Mesh(new THREE.PlaneGeometry(1.4, 1.4), planeMat);
            plane.position.z = 0.06;
            const frameMat = new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 1, roughness: 0.2 });
            const frame = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.6, 0.1), frameMat);
            group.add(plane);
            group.add(frame);
            return group;
        }

        // --- Logic & State Updates ---
        function updateTargets(mode) {
            const isFormingTree = (mode === 'TREE' && STATE.mode !== 'TREE');
            STATE.mode = mode;
            const maxRadius = 10;
            const height = 25;

            if (isFormingTree && treeMaterials.green) {
                treeColorState = (treeColorState + 1) % 3; 

                if (treeColorState === 0) {
                    treeMaterials.green.color.setHex(0x003311); 
                    treeMaterials.gold.color.setHex(0xd4af37);  
                    treeMaterials.red.color.setHex(0xaa0000);   
                } else if (treeColorState === 1) {
                    treeMaterials.green.color.setHex(0x550000); 
                    treeMaterials.gold.color.setHex(0xffaa00);  
                    treeMaterials.red.color.setHex(0xffffff);   
                } else if (treeColorState === 2) {
                    treeMaterials.green.color.setHex(0x003344); 
                    treeMaterials.gold.color.setHex(0xcccccc);  
                    treeMaterials.red.color.setHex(0x0088ff);   
                }
            }

            particles.forEach(p => p.targetScale.set(1,1,1));

            if (mode === 'TREE') {
                particles.forEach((p, i) => {
                    const t = i / particles.length;
                    const radius = maxRadius * (1 - t);
                    const angle = t * 65 * Math.PI; 
                    
                    const x = Math.cos(angle) * radius;
                    const y = t * height - (height/2);
                    const z = Math.sin(angle) * radius;
                    
                    p.targetPos.set(
                        x + (Math.random()-0.5)*0.6, 
                        y + (Math.random()-0.5)*0.6, 
                        z + (Math.random()-0.5)*0.6
                    );
                    p.targetRot.set(0, angle, 0);
                });
            } 
            else if (mode === 'SCATTER') {
                particles.forEach(p => {
                    const r = 8 + Math.random() * 12;
                    const theta = Math.random() * 2 * Math.PI;
                    const phi = Math.acos((Math.random() * 2) - 1);
                    p.targetPos.set(
                        r * Math.sin(phi) * Math.cos(theta),
                        r * Math.sin(phi) * Math.sin(theta),
                        r * Math.cos(phi)
                    );
                });
            }
            else if (mode === 'FOCUS') {
                const photos = particles.filter(p => p.type === 'PHOTO');
                if (photos.length > 0) {
                    STATE.focusTarget = STATE.focusTarget || photos[Math.floor(Math.random() * photos.length)];
                }
                
                particles.forEach(p => {
                    if(p === STATE.focusTarget) {
                        p.targetPos.set(0, 2, 35);
                        p.targetRot.set(0, 0, 0);
                        p.targetScale.set(4.5, 4.5, 4.5);
                    } else {
                        const r = 15 + Math.random() * 20;
                        const theta = Math.random() * 2 * Math.PI;
                        const phi = Math.acos((Math.random() * 2) - 1);
                        p.targetPos.set(
                            r * Math.sin(phi) * Math.cos(theta),
                            r * Math.sin(phi) * Math.sin(theta),
                            r * Math.cos(phi) - 15 
                        );
                    }
                });
            }
        }

        // --- Upload Logic ---
        function setupUpload() {
            document.getElementById('upload').addEventListener('change', (e) => {
                const f = e.target.files[0];
                if(!f) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    new THREE.TextureLoader().load(ev.target.result, (t) => {
                        t.colorSpace = THREE.SRGBColorSpace;
                        addPhotoToScene(t);
                    });
                }
                reader.readAsDataURL(f);
            });
        }

        function addPhotoToScene(texture) {
            const mesh = createPhotoMesh(texture);
            mainGroup.add(mesh);
            const particle = new Particle(mesh, 'PHOTO');
            particles.push(particle);
            
            STATE.focusTarget = particle;
            updateTargets('FOCUS');
        }

        // --- MediaPipe CV ---
        async function initMediaPipe() {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 1
            });

            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 160, height: 120 } });
            video.srcObject = stream;
            await new Promise((resolve) => video.onloadeddata = resolve);
        }

        function processGestures() {
            if (!handLandmarker || video.readyState !== 4) return;
            
            let startTimeMs = performance.now();
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, startTimeMs);
                
                if (results.landmarks.length > 0) {
                    const lm = results.landmarks[0];
                    const getDist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y, p1.z - p2.z);
                    
                    const center = lm[9];
                    mainGroup.rotation.y = THREE.MathUtils.lerp(mainGroup.rotation.y, (center.x - 0.5) * 2, 0.1);
                    mainGroup.rotation.x = THREE.MathUtils.lerp(mainGroup.rotation.x, (center.y - 0.5) * 1.5, 0.1);

                    const isPinch = getDist(lm[4], lm[8]) < 0.05;
                    const wrist = lm[0];
                    const fingers = [lm[8], lm[12], lm[16], lm[20]];
                    const avgDist = fingers.reduce((sum, f) => sum + getDist(f, wrist), 0) / 4;
                    
                    const isFist = avgDist < 0.25;
                    const isOpen = avgDist > 0.4;

                    let newMode = STATE.mode;
                    if (isPinch) newMode = 'FOCUS';
                    else if (isFist) newMode = 'TREE';
                    else if (isOpen) newMode = 'SCATTER';

                    if (newMode !== STATE.mode) {
                        STATE.focusTarget = null;
                        updateTargets(newMode);
                    }
                } else {
                    mainGroup.rotation.y = THREE.MathUtils.lerp(mainGroup.rotation.y, 0, 0.05);
                    mainGroup.rotation.x = THREE.MathUtils.lerp(mainGroup.rotation.x, 0, 0.05);
                }
            }
        }

        // --- Main Loop ---
        function animate() {
            processGestures();
            dustSystem.rotation.y += 0.001;
            particles.forEach(p => p.update());
            composer.render();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
